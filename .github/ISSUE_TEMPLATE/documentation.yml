name: Documentation request
description: Suggest documentation improvements for DevForge CLI
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      description: What is missing, unclear, or outdated?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: What should be added or clarified?
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Relevant file or page
      description: Optional path or page URL
